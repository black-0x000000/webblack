<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Snake - Black</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='black'/%3E%3Ctext x='50' y='68' font-family='Arial,sans-serif' font-size='60' font-weight='bold' fill='white' text-anchor='middle'%3ES%3C/text%3E%3C/svg%3E">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<link rel="stylesheet" href="../assets/css/styles.css">

</head>
<body>
<div class="game-container">
  <div class="bt-topbar">
    <div class="bt-title">
      🐍 Cyber Snake
    </div>
    <button class="bt-home-btn" onclick="window.location.href='../dashboard.html'">🏠 Home</button>
  </div>
  
  <div class="game-main">
    <div class="score-board">Điểm: <span id="score">0</span></div>
    
    <div style="position: relative;">
      <canvas id="gameCanvas" width="400" height="400"></canvas>
      <div id="gameOverScreen" class="game-over">
        <h2>GAME OVER</h2>
        <p>Điểm của bạn: <span id="finalScore">0</span></p>
        <button class="btn-restart" onclick="startGame()">Chơi lại</button>
      </div>
    </div>

    <div class="controls-hint">Sử dụng các phím mũi tên (lên, xuống, trái, phải) để di chuyển.</div>

    <!-- Mobile Controls -->
    <div class="mobile-controls">
      <div class="d-pad-row">
        <div class="d-btn" onclick="setDir(0, -1)">⬆️</div>
      </div>
      <div class="d-pad-row">
        <div class="d-btn" onclick="setDir(-1, 0)">⬅️</div>
        <div class="d-btn" onclick="setDir(0, 1)">⬇️</div>
        <div class="d-btn" onclick="setDir(1, 0)">➡️</div>
      </div>
    </div>

  </div>
</div>

<script src="../assets/js/firebase-config.js"></script>
<script src="../assets/js/app.js"></script>
<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const gridSize = 20;
  const tileCount = canvas.width / gridSize;
  
  let snake = [];
  let food = {};
  let dx = 0;
  let dy = 0;
  let score = 0;
  let gameTimeout;
  let speed = 180; // Khởi đầu chậm (180ms)
  let isGameOver = false;

  function startGame() {
    document.getElementById('gameOverScreen').classList.remove('show');
    snake = [{x: 10, y: 10}];
    dx = 1; dy = 0;
    score = 0;
    speed = 180;
    isGameOver = false;
    document.getElementById('score').innerText = score;
    placeFood();
    if(gameTimeout) clearTimeout(gameTimeout);
    gameLoop();
  }

  function gameLoop() {
    if (isGameOver) return;
    update();
    draw();
    if (!isGameOver) {
      gameTimeout = setTimeout(gameLoop, speed);
    }
  }

  function update() {
    const head = { x: snake[0].x + dx, y: snake[0].y + dy };

    // Wall collision
    if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
      return gameOver();
    }
    // Self collision
    for (let i = 0; i < snake.length; i++) {
      if (snake[i].x === head.x && snake[i].y === head.y) return gameOver();
    }

    snake.unshift(head);

    // Food collision
    if (head.x === food.x && head.y === food.y) {
      score += 10;
      document.getElementById('score').innerText = score;
      // Rắn di chuyển nhanh dần, giới hạn tốc độ tối đa là 50ms
      if (speed > 50) speed -= 5;
      placeFood();
    } else {
      snake.pop();
    }
  }

  function draw() {
    // Clear canvas
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Draw snake
    snake.forEach((part, index) => {
      ctx.fillStyle = index === 0 ? '#68d391' : '#48bb78';
      ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 1, gridSize - 1);
    });

    // Draw food
    ctx.fillStyle = '#fc8181';
    ctx.beginPath();
    ctx.arc(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2 - 2, 0, Math.PI * 2);
    ctx.fill();
  }

  function placeFood() {
    food = {
      x: Math.floor(Math.random() * tileCount),
      y: Math.floor(Math.random() * tileCount)
    };
    // Ensure food doesn't spawn on snake
    for(let part of snake) {
      if(part.x === food.x && part.y === food.y) {
        placeFood();
        break;
      }
    }
  }

  function gameOver() {
    isGameOver = true;
    document.getElementById('finalScore').innerText = score;
    document.getElementById('gameOverScreen').classList.add('show');
  }

  function setDir(x, y) {
    if (x === 1 && dx === -1) return;
    if (x === -1 && dx === 1) return;
    if (y === 1 && dy === -1) return;
    if (y === -1 && dy === 1) return;
    dx = x; dy = y;
  }

  document.addEventListener('keydown', e => {
    if (isGameOver && e.key === 'Enter') {
      startGame();
      return;
    }
    if (e.key === 'ArrowUp') setDir(0, -1);
    else if (e.key === 'ArrowDown') setDir(0, 1);
    else if (e.key === 'ArrowLeft') setDir(-1, 0);
    else if (e.key === 'ArrowRight') setDir(1, 0);
  });

  // Prevent default scrolling for arrow keys
  window.addEventListener("keydown", function(e) {
    if(["Space","ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(e.code) > -1) {
        e.preventDefault();
    }
  }, false);

  // Auto start
  startGame();
</script>
</body>
</html>
