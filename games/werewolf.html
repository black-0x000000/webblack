<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐺 Ma Sói - Black</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='black'/%3E%3Ctext x='50' y='68' font-family='Arial,sans-serif' font-size='60' font-weight='bold' fill='white' text-anchor='middle'%3ES%3C/text%3E%3C/svg%3E">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
        }

        #topBar {
            position: fixed;
            top: 0; left: 0; right: 0; z-index: 100;
            height: 60px;
            background: rgba(22, 27, 38, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }
        #topBar .title { font-size: 1.1rem; font-weight: 700; color: #f8fafc; }
        #topBar .btn-logout {
            padding: 8px 20px;
            background: rgba(244, 63, 94, 0.1);
            border: 1px solid rgba(244, 63, 94, 0.2);
            color: #f43f5e;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        #topBar .btn-logout:hover { background: #f43f5e; color: #fff; }
        #topBar #timerDisplay { display: none; }

        .container {
            display: flex;
            height: calc(100vh - 60px);
            padding-top: 60px;
            background: #0d1117;
        }
        .main {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* LOBBY SELECTOR */
        #lobbySelector {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 500px;
        }
        #lobbySelector h1 { font-size: 2.5rem; color: #f8fafc; }
        #lobbySelector .subtitle { color: #94a3b8; font-size: 1.1rem; }

        .btn-group {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }
        .btn {
            padding: 14px 36px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 160px;
            flex: 1;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00f0ff, #3b82f6);
            color: #0f172a;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0, 240, 255, 0.3); }
        .btn-secondary {
            background: rgba(22, 27, 38, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #f8fafc;
        }
        .btn-secondary:hover { background: rgba(30, 37, 51, 0.85); transform: translateY(-2px); }
        .btn-danger { background: #f43f5e; color: #fff; }
        .btn-danger:hover { background: #e06060; }
        .btn-success { background: #10b981; color: #0f172a; }
        .btn-success:hover { background: #059669; }
        .btn-cancel {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #94a3b8;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
            font-weight: 600;
        }
        .btn-cancel:hover { background: rgba(255, 255, 255, 0.05); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

        .form-group {
            margin-bottom: 16px;
            width: 100%;
        }
        .form-group label {
            display: block;
            color: #94a3b8;
            margin-bottom: 6px;
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            color: #f8fafc;
            font-size: 1rem;
            outline: none;
        }
        .form-group input:focus {
            border-color: #00f0ff;
            box-shadow: 0 0 0 3px rgba(0, 240, 255, 0.1);
        }
        .join-row {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .join-row input {
            flex: 1;
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            color: #f8fafc;
            font-size: 1.1rem;
            text-align: center;
            letter-spacing: 4px;
            font-family: monospace;
            outline: none;
            text-transform: uppercase;
            min-width: 150px;
        }
        .join-row input:focus { border-color: #00f0ff; }

        .hidden { display: none !important; }

        /* GAME CONTENT (sau khi vào phòng) */
        #gameContent {
            display: none;
            width: 100%;
            max-width: 800px;
        }
        #gameContent.active { display: block; }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            flex-wrap: wrap;
            gap: 8px;
        }
        .game-title { font-size: 1.3rem; font-weight: 700; }
        .lobby-id {
            font-family: monospace;
            font-size: 1.2rem;
            color: #00f0ff;
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            letter-spacing: 3px;
        }

        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            margin: 16px 0;
        }
        .player-card {
            background: rgba(22, 27, 38, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 12px 16px;
            text-align: center;
        }
        .player-card .p-name { font-weight: 600; font-size: 0.95rem; }
        .player-card .p-role { font-size: 0.8rem; color: #94a3b8; margin-top: 4px; }
        .player-card.host { border-color: #00f0ff; }
        .player-card .host-badge {
            font-size: 0.65rem;
            color: #00f0ff;
            background: rgba(0, 240, 255, 0.1);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .game-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 12px 0;
        }

        .status-msg {
            padding: 12px 16px;
            border-radius: 10px;
            text-align: center;
            margin-top: 12px;
            font-weight: 600;
        }
        .status-msg.success { background: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
        .status-msg.error { background: rgba(244, 63, 94, 0.15); color: #f43f5e; border: 1px solid rgba(244, 63, 94, 0.3); }
        .status-msg.info { background: rgba(0, 240, 255, 0.1); color: #00f0ff; border: 1px solid rgba(0, 240, 255, 0.2); }

        .sidebar {
            width: 320px;
            background: rgba(22, 27, 38, 0.65);
            border-left: 1px solid rgba(255, 255, 255, 0.08);
            display: none;
            flex-direction: column;
            padding: 16px;
            height: 100%;
        }
        .sidebar.active { display: flex; }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            overflow: hidden;
            min-height: 200px;
        }
        .chat-messages {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            max-height: 400px;
        }
        .chat-message {
            padding: 6px 10px;
            margin-bottom: 4px;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        .chat-message .msg-user { font-weight: 600; color: #00f0ff; }
        .chat-message .msg-time { font-size: 0.7rem; color: #94a3b8; margin-left: 8px; }
        .chat-input-area {
            display: flex;
            gap: 8px;
            padding: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(0, 0, 0, 0.2);
        }
        .chat-input-area input {
            flex: 1;
            padding: 8px 14px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            color: #f8fafc;
            outline: none;
        }
        .chat-input-area input:focus { border-color: #00f0ff; }
        .chat-input-area button {
            padding: 8px 16px;
            background: #3b82f6;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        /* MODAL */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            animation: fadeIn 0.2s ease;
        }
        .modal-overlay.hidden { display: none; }

        .modal-box {
            background: #1a1f2e;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 40px 48px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }
        .modal-icon { font-size: 3rem; margin-bottom: 12px; }
        .modal-title { font-size: 1.5rem; font-weight: 700; color: #f8fafc; margin-bottom: 8px; }
        .modal-desc { color: #94a3b8; font-size: 1rem; margin-bottom: 24px; }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .btn-modal {
            padding: 12px 32px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 100px;
        }
        .btn-modal-cancel {
            background: rgba(255, 255, 255, 0.05);
            color: #94a3b8;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .btn-modal-cancel:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .btn-modal-confirm {
            background: #f43f5e;
            color: #fff;
        }
        .btn-modal-confirm:hover {
            background: #e06060;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(244, 63, 94, 0.3);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; border-left: none; border-top: 1px solid rgba(255, 255, 255, 0.08); max-height: 300px; }
            .btn { min-width: 120px; padding: 12px 20px; }
            .join-row { flex-direction: column; }
            .join-row input { width: 100%; }
            .modal-box { padding: 30px 24px; }
        }
    </style>
</head>
<body>

<!-- TOP BAR -->
<div id="topBar">
    <div id="timerDisplay">⏱ 00:00:00</div>
    <div class="title">🐺 Ma Sói</div>
    <button class="btn-logout" onclick="doLogout()">Đăng xuất</button>
</div>

<div class="container">
    <!-- MAIN CONTENT -->
    <div class="main">
        <!-- LOBBY SELECTOR -->
        <div id="lobbySelector">
            <h1>🐺 Ma Sói</h1>
            <p class="subtitle">Chọn hành động để bắt đầu</p>
            <div class="btn-group">
                <button class="btn btn-primary" id="btnShowCreate">🆕 Tạo Phòng</button>
                <button class="btn btn-secondary" id="btnShowJoin">🔗 Tham gia phòng</button>
            </div>

            <!-- Form tạo phòng -->
            <div id="createForm" class="hidden" style="width:100%;">
                <div class="form-group">
                    <label>Tên phòng</label>
                    <input type="text" id="lobbyNameInput" placeholder="Nhập tên phòng...">
                </div>
                <button class="btn btn-success" id="btnCreate" style="width:100%;">✅ Tạo phòng</button>
                <button class="btn-cancel" id="btnCancelCreate">❌ Hủy</button>
                <div id="createStatus" class="status-msg hidden"></div>
            </div>

            <!-- Form tham gia phòng -->
            <div id="joinForm" class="hidden" style="width:100%;">
                <div class="form-group">
                    <label>Nhập mã phòng (6 ký tự)</label>
                    <div class="join-row">
                        <input type="text" id="lobbyIdInput" placeholder="VD: A1B2C3" maxlength="6">
                        <button class="btn btn-primary" id="btnJoin" style="flex:0;">🔗 Tham gia</button>
                    </div>
                </div>
                <button class="btn-cancel" id="btnCancelJoin">❌ Hủy</button>
                <div id="joinStatus" class="status-msg hidden"></div>
            </div>
        </div>

        <!-- GAME CONTENT -->
        <div id="gameContent">
            <div class="game-header">
                <div class="game-title" id="lobbyName">Phòng chơi</div>
                <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
                    <span class="lobby-id" id="lobbyIdDisplay">🆔 ------</span>
                    <span class="game-status waiting" id="gameStatus">⏳ Đang chờ</span>
                </div>
            </div>

            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                <span style="color:#94a3b8; font-size:0.9rem;">Người chơi: <span id="playerCount">1</span>/10</span>
            </div>
            <div class="players-grid" id="playersGrid"></div>

            <div class="game-controls">
                <button class="btn btn-secondary btn-sm" id="btnLeave">🚪 Rời phòng</button>
            </div>

            <div id="gameStatusMsg" class="status-msg hidden"></div>
        </div>
    </div>

    <!-- SIDEBAR - CHAT -->
    <div class="sidebar" id="gameSidebar">
        <div style="font-weight:600; color:#94a3b8; margin-bottom:8px;">💬 Trò chuyện</div>
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div style="color:#94a3b8; text-align:center; padding:20px; font-size:0.9rem;">Chưa có tin nhắn</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Nhập tin nhắn...">
                <button id="btnSendChat">Gửi</button>
            </div>
        </div>
    </div>
</div>

<!-- MODAL XÁC NHẬN RỜI PHÒNG -->
<div id="leaveModal" class="modal-overlay hidden">
    <div class="modal-box">
        <div class="modal-icon">🚪</div>
        <h3 class="modal-title">Rời phòng?</h3>
        <p class="modal-desc">Bạn có chắc chắn muốn rời phòng chơi?</p>
        <div class="modal-actions">
            <button class="btn-modal btn-modal-cancel" id="btnStay">Ở lại</button>
            <button class="btn-modal btn-modal-confirm" id="btnConfirmLeave">Rời</button>
        </div>
    </div>
</div>

<script src="../assets/js/firebase-config.js"></script>
<script src="../assets/js/app.js"></script>
<script>
    // ===== WEREWOLF GAME =====
    const Game = {
        currentUser: null,
        currentRole: null,
        lobbyId: null,
        isHost: false,
        lobbyListener: null,
        chatListener: null,

        init() {
            this.currentUser = sessionStorage.getItem('currentUser');
            this.currentRole = sessionStorage.getItem('currentRole');

            if (!this.currentUser) {
                window.location.href = '../index.html';
                return;
            }

            this.bindEvents();

            const params = new URLSearchParams(window.location.search);
            const lobbyId = params.get('lobby');
            if (lobbyId) {
                this.lobbyId = lobbyId;
                this.joinLobbyById(lobbyId);
            }
        },

        bindEvents() {
            document.getElementById('btnShowCreate').addEventListener('click', () => this.showCreateForm());
            document.getElementById('btnShowJoin').addEventListener('click', () => this.showJoinForm());
            document.getElementById('btnCancelCreate').addEventListener('click', () => this.hideCreateForm());
            document.getElementById('btnCancelJoin').addEventListener('click', () => this.hideJoinForm());
            document.getElementById('btnCreate').addEventListener('click', () => this.createLobby());
            document.getElementById('btnJoin').addEventListener('click', () => this.joinLobby());
            document.getElementById('btnLeave').addEventListener('click', () => this.leaveLobby());
            document.getElementById('btnSendChat').addEventListener('click', () => this.sendChat());

            // Modal
            document.getElementById('btnStay').addEventListener('click', () => this.cancelLeave());
            document.getElementById('btnConfirmLeave').addEventListener('click', () => this.confirmLeave());
            document.getElementById('leaveModal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('leaveModal')) {
                    this.cancelLeave();
                }
            });

            document.getElementById('lobbyNameInput').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') this.createLobby();
            });
            document.getElementById('lobbyIdInput').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') this.joinLobby();
            });
            document.getElementById('chatInput').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') this.sendChat();
            });
        },

        showCreateForm() {
            document.getElementById('createForm').classList.remove('hidden');
            document.getElementById('joinForm').classList.add('hidden');
            document.getElementById('createStatus').classList.add('hidden');
            document.getElementById('lobbyNameInput').focus();
        },

        hideCreateForm() {
            document.getElementById('createForm').classList.add('hidden');
        },

        showJoinForm() {
            document.getElementById('joinForm').classList.remove('hidden');
            document.getElementById('createForm').classList.add('hidden');
            document.getElementById('joinStatus').classList.add('hidden');
            document.getElementById('lobbyIdInput').focus();
        },

        hideJoinForm() {
            document.getElementById('joinForm').classList.add('hidden');
        },

        generateLobbyId() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let id = '';
            for (let i = 0; i < 6; i++) {
                id += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return id;
        },

        showStatus(elementId, message, type) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.className = 'status-msg ' + type;
            el.classList.remove('hidden');
        },

        hideStatus(elementId) {
            document.getElementById(elementId).classList.add('hidden');
        },

        async createLobby() {
            const nameInput = document.getElementById('lobbyNameInput');
            const lobbyName = nameInput.value.trim() || 'Phòng của ' + this.currentUser;

            if (this.currentRole === 'user') {
                const snap = await db.ref('accounts/' + this.currentUser + '/games/werewolf').once('value');
                if (!snap.val()) {
                    this.showStatus('createStatus', '❌ Bạn chưa mua game Ma Sói! Quay lại trang chủ để mua.', 'error');
                    return;
                }
            }

            const lobbyId = this.generateLobbyId();

            const checkSnap = await db.ref('gameLobbies/' + lobbyId).once('value');
            if (checkSnap.exists()) {
                this.createLobby();
                return;
            }

            const lobbyData = {
                name: lobbyName,
                host: this.currentUser,
                status: 'waiting',
                players: {
                    [this.currentUser]: {
                        role: null,
                        alive: true,
                        ready: false,
                        isHost: true
                    }
                },
                chat: {},
                createdAt: Date.now()
            };

            await db.ref('gameLobbies/' + lobbyId).set(lobbyData);

            this.lobbyId = lobbyId;
            this.isHost = true;

            window.history.pushState({}, '', '?lobby=' + lobbyId);

            this.showGameContent();
            this.listenLobby();

            this.showStatus('createStatus', '✅ Tạo phòng thành công! Mã phòng: ' + lobbyId, 'success');

            setTimeout(() => {
                this.hideCreateForm();
                this.hideStatus('createStatus');
            }, 2000);
        },

        async joinLobby() {
            const input = document.getElementById('lobbyIdInput');
            const lobbyId = input.value.trim().toUpperCase();

            if (!lobbyId || lobbyId.length !== 6) {
                this.showStatus('joinStatus', '❌ Vui lòng nhập mã phòng 6 ký tự!', 'error');
                return;
            }

            await this.joinLobbyById(lobbyId);
        },

        async joinLobbyById(lobbyId) {
            const lobbySnap = await db.ref('gameLobbies/' + lobbyId).once('value');
            if (!lobbySnap.exists()) {
                this.showStatus('joinStatus', '❌ Không tìm thấy phòng với mã: ' + lobbyId, 'error');
                return;
            }

            const lobby = lobbySnap.val();
            if (lobby.status === 'ended') {
                this.showStatus('joinStatus', '❌ Phòng đã kết thúc!', 'error');
                return;
            }

            if (Object.keys(lobby.players).length >= 10) {
                this.showStatus('joinStatus', '❌ Phòng đã đầy! (Tối đa 10 người)', 'error');
                return;
            }

            if (this.currentRole === 'user') {
                const snap = await db.ref('accounts/' + this.currentUser + '/games/werewolf').once('value');
                if (!snap.val()) {
                    this.showStatus('joinStatus', '❌ Bạn chưa mua game Ma Sói! Quay lại trang chủ để mua.', 'error');
                    return;
                }
            }

            if (!lobby.players[this.currentUser]) {
                await db.ref('gameLobbies/' + lobbyId + '/players/' + this.currentUser).set({
                    role: null,
                    alive: true,
                    ready: false,
                    isHost: false
                });
            }

            this.lobbyId = lobbyId;
            this.isHost = false;

            window.history.pushState({}, '', '?lobby=' + lobbyId);

            this.showGameContent();
            this.listenLobby();

            this.hideJoinForm();
            this.hideStatus('joinStatus');
        },

        showGameContent() {
            document.getElementById('lobbySelector').style.display = 'none';
            document.getElementById('gameContent').classList.add('active');
            document.getElementById('gameSidebar').classList.add('active');

            document.getElementById('lobbyIdDisplay').textContent = '🆔 ' + this.lobbyId;

            db.ref('gameLobbies/' + this.lobbyId + '/name').once('value', (snap) => {
                document.getElementById('lobbyName').textContent = snap.val() || 'Phòng chơi';
            });
        },

        listenLobby() {
            if (this.lobbyListener) {
                this.lobbyListener();
            }
            this.lobbyListener = db.ref('gameLobbies/' + this.lobbyId).on('value', (snapshot) => {
                const lobby = snapshot.val();
                if (!lobby) {
                    alert('Phòng đã bị xóa!');
                    this.leaveLobby();
                    return;
                }

                this.renderPlayers(lobby);
                this.updatePlayerCount(lobby);
                this.updateGameStatus(lobby);
                this.updateChat(lobby);
            });
        },

        renderPlayers(lobby) {
            const grid = document.getElementById('playersGrid');
            const players = lobby.players || {};

            if (Object.keys(players).length === 0) {
                grid.innerHTML = '<div style="grid-column:span 3; text-align:center; color:#94a3b8; padding:20px;">Chưa có người chơi</div>';
                return;
            }

            grid.innerHTML = Object.entries(players).map(([name, data]) => {
                const isHost = data.isHost;
                const isMe = name === this.currentUser;
                return `
                    <div class="player-card ${isHost ? 'host' : ''}">
                        <div class="p-name">${isMe ? '⭐ ' : ''}${name}</div>
                        <div class="p-role">${isHost ? '<span class="host-badge">👑 Chủ phòng</span>' : '❓'}</div>
                    </div>
                `;
            }).join('');
        },

        updatePlayerCount(lobby) {
            const count = Object.keys(lobby.players || {}).length;
            document.getElementById('playerCount').textContent = count;
        },

        updateGameStatus(lobby) {
            const el = document.getElementById('gameStatus');
            const statusMap = {
                'waiting': '⏳ Đang chờ',
                'playing': '🔄 Đang chơi',
                'ended': '🏁 Đã kết thúc'
            };
            el.textContent = statusMap[lobby.status] || lobby.status;
            el.className = 'game-status ' + lobby.status;
        },

        updateChat(lobby) {
            if (this.chatListener) {
                this.chatListener();
            }
            this.chatListener = db.ref('gameLobbies/' + this.lobbyId + '/chat').on('child_added', (snapshot) => {
                const msg = snapshot.val();
                if (!msg) return;
                this.addChatMessage(msg.user, msg.message, msg.timestamp);
            });
        },

        addChatMessage(user, message, timestamp) {
            const container = document.getElementById('chatMessages');
            if (container.querySelector('div[style]')) {
                container.innerHTML = '';
            }

            const time = new Date(timestamp).toLocaleTimeString('vi-VN');
            const isMe = user === this.currentUser;

            const div = document.createElement('div');
            div.className = 'chat-message';
            div.innerHTML = `
                <span class="msg-user" style="${isMe ? 'color:#10b981;' : ''}">${user}</span>
                <span class="msg-time">${time}</span>
                <span style="margin-left:8px;">${message}</span>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        },

        async sendChat() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message || !this.lobbyId) return;

            await db.ref('gameLobbies/' + this.lobbyId + '/chat').push({
                user: this.currentUser,
                message: message,
                timestamp: Date.now()
            });

            input.value = '';
        },

        // === MODAL RỜI PHÒNG ===
        leaveLobby() {
            document.getElementById('leaveModal').classList.remove('hidden');
        },

        cancelLeave() {
            document.getElementById('leaveModal').classList.add('hidden');
        },

        async confirmLeave() {
            document.getElementById('leaveModal').classList.add('hidden');

            try {
                if (this.lobbyId) {
                    const snap = await db.ref('gameLobbies/' + this.lobbyId).once('value');
                    const lobby = snap.val();

                    if (lobby && lobby.players) {
                        await db.ref('gameLobbies/' + this.lobbyId + '/players/' + this.currentUser).remove();

                        const newSnap = await db.ref('gameLobbies/' + this.lobbyId + '/players').once('value');
                        const remaining = newSnap.val() || {};

                        if (Object.keys(remaining).length === 0) {
                            await db.ref('gameLobbies/' + this.lobbyId).remove();
                        } else if (lobby.host === this.currentUser) {
                            const newHost = Object.keys(remaining)[0];
                            await db.ref('gameLobbies/' + this.lobbyId + '/host').set(newHost);
                            await db.ref('gameLobbies/' + this.lobbyId + '/players/' + newHost + '/isHost').set(true);
                        }
                    }
                }

                if (this.lobbyListener) {
                    this.lobbyListener();
                    this.lobbyListener = null;
                }
                if (this.chatListener) {
                    this.chatListener();
                    this.chatListener = null;
                }

                this.lobbyId = null;
                window.location.href = '../dashboard.html';

            } catch (e) {
                console.error('Lỗi rời phòng:', e);
                window.location.href = '../dashboard.html';
            }
        }
    };

    document.addEventListener('DOMContentLoaded', () => Game.init());
</script>
</body>
</html>
