<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='black'/%3E%3Ctext x='50' y='68' font-family='Arial,sans-serif' font-size='60' font-weight='bold' fill='white' text-anchor='middle'%3ES%3C/text%3E%3C/svg%3E">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>

* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  font-family: Arial, sans-serif; 
  background: #0a0a0a; 
  color: #fff; 
  height: 100vh; 
  overflow: hidden;
}

#bitmapTool {
  display: flex !important;
  flex-direction: column;
  height: 100vh;
  width: 100vw;
  background: #0a0a0a;
  padding: 10px;
  gap: 8px;
}

.bt-topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #1a1a1a;
  padding: 8px 16px;
  border-radius: 6px;
  flex-shrink: 0;
}
.bt-title {
  font-size: 18px;
  font-weight: bold;
  color: #fff;
}
.dev-tag {
  font-size: 12px;
  font-weight: normal;
  color: #888;
  margin-left: 12px;
}
.bt-home-btn {
  background: #333;
  border: none;
  color: #fff;
  padding: 6px 16px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 14px;
}

.bt-controls {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 6px 12px;
  background: #1a1a1a;
  padding: 8px 14px;
  border-radius: 6px;
  flex-shrink: 0;
}
.bt-ctrl-group {
  display: flex;
  align-items: center;
  gap: 6px;
}
.bt-ctrl-group label {
  font-size: 13px;
  color: #aaa;
  white-space: nowrap;
}
.bt-ctrl-group input[type="number"] {
  width: 50px;
  padding: 4px 6px;
  background: #222;
  border: 1px solid #444;
  border-radius: 4px;
  color: #fff;
  font-size: 13px;
  text-align: center;
}
.bt-state-group {
  display: flex;
  align-items: center;
  gap: 6px;
}
.bt-state-label {
  font-size: 13px;
  color: #aaa;
}
.bt-state-indicator {
  font-size: 14px;
  font-weight: bold;
  color: #4caf50;
  min-width: 32px;
}
.bt-state-indicator.erase {
  color: #f44336;
}

.bt-btn {
  padding: 4px 14px;
  border: none;
  border-radius: 4px;
  font-size: 13px;
  cursor: pointer;
  font-weight: bold;
}
.bt-btn-fill {
  background: #2a2a2a;
  color: #aaa;
}
.bt-btn-fill.active {
  background: #4caf50;
  color: #fff;
}
.bt-btn-erase {
  background: #2a2a2a;
  color: #aaa;
}
.bt-btn-erase.active {
  background: #f44336;
  color: #fff;
}
.bt-btn-clear {
  background: #e67e22;
  color: #fff;
}
.bt-btn-reset {
  background: #555;
  color: #fff;
}

.bt-canvas-area {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #111;
  border-radius: 6px;
  min-height: 0;
  padding: 10px;
  overflow: auto;
}

#pixelGrid {
  display: grid;
  gap: 1px;
  background: #1a1a1a;
  width: fit-content;
  height: fit-content;
}


.pixel {
  background: #222;
  border-radius: 1px;
  cursor: pointer;
  aspect-ratio: 1 / 1;  
  width: 100%;
  height: auto;
  min-width: 16px;
  min-height: 16px;
  max-width: 50px;
  max-height: 50px;
}
.pixel.filled {
  background: #4caf50;
}

.bt-output-area {
  display: flex;
  align-items: center;
  gap: 12px;
  background: #1a1a1a;
  padding: 8px 16px;
  border-radius: 6px;
  flex-shrink: 0;
}
.bt-output-label {
  font-size: 13px;
  color: #aaa;
  font-weight: bold;
}
.bt-hex-output {
  font-family: 'Courier New', monospace;
  font-size: 14px;
  color: #4caf50;
  word-break: break-all;
  background: #0a0a0a;
  padding: 4px 12px;
  border-radius: 4px;
  flex: 1;
}
</style>
</head>
<body>

<div id="bitmapTool" class="show" style="display:flex;">
  <div class="bt-topbar">
    <div class="bt-title">
      🖼️ Dịch bitmap
      <span class="dev-tag">| Dev: @Black &nbsp;[discord: black_0x000000]</span>
    </div>
    <button class="bt-home-btn" onclick="closeBitmapTool()">🏠 Home</button>
  </div>

  <div class="bt-controls">
    <div class="bt-ctrl-group">
      <label>Chiều dài (tối đa 192):</label>
      <input type="number" id="btWidth" min="1" max="192" value="8">
    </div>
    <div class="bt-divider"></div>
    <div class="bt-ctrl-group">
      <label>Chiều rộng (tối đa 63):</label>
      <input type="number" id="btHeight" min="1" max="63" value="8">
    </div>
    <div class="bt-divider"></div>
    <div class="bt-state-group">
      <span class="bt-state-label">Trạng thái:</span>
      <span class="bt-state-indicator" id="btStateLabel">Tô</span>
    </div>
    <div class="bt-ctrl-group">
      <button class="bt-btn bt-btn-fill active" id="btnFill" onclick="setMode('fill')">Tô</button>
      <button class="bt-btn bt-btn-erase" id="btnErase" onclick="setMode('erase')">Xóa</button>
    </div>
    <div class="bt-divider"></div>
    <div class="bt-ctrl-group">
      <button class="bt-btn bt-btn-clear" onclick="clearPixels()">CLEAR</button>
      <button class="bt-btn bt-btn-reset" onclick="resetBitmap()">RESET</button>
    </div>
  </div>

  <div class="bt-canvas-area" id="btCanvasArea">
    <div id="pixelGrid"></div>
  </div>

  <div class="bt-output-area">
    <div class="bt-output-label">Hex:</div>
    <div class="bt-hex-output" id="btHexOutput">—</div>
  </div>
</div>

<script>

let pixels = [];
let mode = 'fill';
let width = 8;
let height = 8;

const gridEl = document.getElementById('pixelGrid');
const widthInput = document.getElementById('btWidth');
const heightInput = document.getElementById('btHeight');
const stateLabel = document.getElementById('btStateLabel');
const hexOutput = document.getElementById('btHexOutput');
const btnFill = document.getElementById('btnFill');
const btnErase = document.getElementById('btnErase');

function init() {
  width = parseInt(widthInput.value) || 8;
  height = parseInt(heightInput.value) || 8;
  if (width < 1) width = 1;
  if (width > 192) width = 192;
  if (height < 1) height = 1;
  if (height > 63) height = 63;
  widthInput.value = width;
  heightInput.value = height;
  pixels = Array(height).fill().map(() => Array(width).fill(0));
  render();
  updateHex();
}

function render() {
  gridEl.innerHTML = '';
  gridEl.style.gridTemplateColumns = `repeat(${width}, 1fr)`;
  gridEl.style.gridTemplateRows = `repeat(${height}, 1fr)`;
  
  const container = document.getElementById('btCanvasArea');
  const containerRect = container.getBoundingClientRect();
  const padding = 20;
  const gapSize = 1;
  const totalGapX = (width - 1) * gapSize;
  const totalGapY = (height - 1) * gapSize;
  
  let maxSize = Math.min(
    (containerRect.width - padding * 2 - totalGapX) / width,
    (containerRect.height - padding * 2 - totalGapY) / height
  );
  maxSize = Math.max(12, Math.min(50, maxSize));
  
  for (let r = 0; r < height; r++) {
    for (let c = 0; c < width; c++) {
      const cell = document.createElement('div');
      cell.className = 'pixel' + (pixels[r][c] ? ' filled' : '');
      cell.dataset.row = r;
      cell.dataset.col = c;
      cell.style.width = maxSize + 'px';
      cell.style.height = maxSize + 'px'; // CSS aspect-ratio sẽ giữ vuông
      cell.addEventListener('click', () => togglePixel(r, c));
      cell.addEventListener('mousedown', (e) => {
        e.preventDefault();
        togglePixel(r, c);
      });
      cell.addEventListener('mouseenter', (e) => {
        if (e.buttons === 1) togglePixel(r, c);
      });
      gridEl.appendChild(cell);
    }
  }
}

function togglePixel(row, col) {
  if (row < 0 || row >= height || col < 0 || col >= width) return;
  if (mode === 'fill') {
    if (pixels[row][col] === 0) {
      pixels[row][col] = 1;
      updateCell(row, col);
      updateHex();
    }
  } else {
    if (pixels[row][col] === 1) {
      pixels[row][col] = 0;
      updateCell(row, col);
      updateHex();
    }
  }
}

function updateCell(row, col) {
  const idx = row * width + col;
  const cell = gridEl.children[idx];
  if (cell) {
    if (pixels[row][col]) cell.classList.add('filled');
    else cell.classList.remove('filled');
  }
}

function updateGrid() {
  let newWidth = parseInt(widthInput.value) || 1;
  let newHeight = parseInt(heightInput.value) || 1;
  if (newWidth < 1) newWidth = 1;
  if (newWidth > 192) newWidth = 192;
  if (newHeight < 1) newHeight = 1;
  if (newHeight > 63) newHeight = 63;
  widthInput.value = newWidth;
  heightInput.value = newHeight;
  const newPixels = Array(newHeight).fill().map(() => Array(newWidth).fill(0));
  for (let r = 0; r < Math.min(height, newHeight); r++) {
    for (let c = 0; c < Math.min(width, newWidth); c++) {
      newPixels[r][c] = pixels[r]?.[c] || 0;
    }
  }
  width = newWidth;
  height = newHeight;
  pixels = newPixels;
  render();
  updateHex();
}

function setMode(newMode) {
  mode = newMode;
  if (mode === 'fill') {
    btnFill.classList.add('active');
    btnErase.classList.remove('active');
    stateLabel.textContent = 'Tô';
    stateLabel.className = 'bt-state-indicator';
  } else {
    btnErase.classList.add('active');
    btnFill.classList.remove('active');
    stateLabel.textContent = 'Xóa';
    stateLabel.className = 'bt-state-indicator erase';
  }
}

function clearPixels() {
  for (let r = 0; r < height; r++) {
    for (let c = 0; c < width; c++) {
      pixels[r][c] = 0;
    }
  }
  render();
  updateHex();
}

function resetBitmap() {
  widthInput.value = 8;
  heightInput.value = 8;
  updateGrid();
}

function updateHex() {
  let hex = '';
  for (let r = 0; r < height; r++) {
    let rowHex = '';
    let byte = 0;
    for (let c = 0; c < width; c++) {
      if (pixels[r][c]) byte |= (1 << (width - 1 - c));
    }
    const bytesNeeded = Math.ceil(width / 8);
    for (let b = bytesNeeded - 1; b >= 0; b--) {
      const shift = b * 8;
      const val = (byte >> shift) & 0xFF;
      rowHex += val.toString(16).padStart(2, '0').toUpperCase();
    }
    hex += rowHex;
  }
  hexOutput.textContent = hex || '—';
}

function closeBitmapTool() {
  alert('Chức năng Home tạm thời chưa kết nối!');
}

document.addEventListener('dragstart', (e) => e.preventDefault());

let resizeTimeout;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimeout);
  resizeTimeout = setTimeout(() => render(), 100);
});


widthInput.onchange = updateGrid;
heightInput.onchange = updateGrid;

init();
</script>
</body>
</html>
